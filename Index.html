<!DOCTYPE html><html>
<head>
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head><body><div class="container"><!-- Sidebar -->
<div class="sidebar">
    <h2>Library</h2>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('books')">Book List</button>
    <button onclick="showSection('students')">Student List</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Home -->
    <div id="home" class="section">
        <h2>Welcome to Library Dashboard</h2>
    </div>

    <!-- Book List -->
    <div id="books" class="section" style="display:none;">
        <h2>Book List</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Book</th>
                <th>Author</th>
                <th>Available</th>
                <th>Borrow</th>
            </tr>
            <tr><td>1</td><td>ABC</td><td>Author 1</td><td>20</td><td>6</td></tr>
            <tr><td>2</td><td>DEF</td><td>Author 2</td><td>40</td><td>16</td></tr>
        </table>
    </div>

    <!-- Student List -->
    <div id="students" class="section" style="display:none;">
        <h2>Student List</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
            </tr>
            <tr><td>101</td><td>Ali</td><td>BCA</td></tr>
            <tr><td>102</td><td>Rahul</td><td>BSc</td></tr>
        </table>
    </div>

</div>

</div><script src="script.js"></script></body>
</html>
